<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dashboard Evaluacion de Personal</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #f5f5f3; color: #1a1a1a; padding: 2rem; }
h1 { font-size: 20px; font-weight: 500; margin-bottom: 4px; }
.subtitle { font-size: 12px; color: #888; margin-bottom: 1.5rem; }
.upload-box { background: #fff; border: 1px dashed #ccc; border-radius: 10px; padding: 1.2rem 1.5rem; margin-bottom: 1.5rem; display: flex; align-items: center; gap: 12px; flex-wrap: wrap; }
.upload-box label { font-size: 13px; font-weight: 500; cursor: pointer; background: #EEEDFE; color: #3C3489; padding: 6px 14px; border-radius: 6px; }
.upload-box input[type=file] { display: none; }
.upload-status { font-size: 13px; color: #888; }
.upload-status.ok { color: #0F6E56; font-weight: 500; }
.upload-status.warn { color: #993C1D; font-weight: 500; }
.total-info { font-size: 12px; background: #E6F1FB; color: #0C447C; padding: 4px 10px; border-radius: 6px; font-weight: 500; }
.cards { display: grid; grid-template-columns: repeat(auto-fit, minmax(290px, 1fr)); gap: 1rem; }
.person-card { background: #fff; border: 0.5px solid #e0dfd8; border-radius: 12px; padding: 1.25rem; }
.person-header { display: flex; align-items: center; gap: 10px; margin-bottom: 1rem; padding-bottom: 1rem; border-bottom: 0.5px solid #e0dfd8; }
.avatar { width: 40px; height: 40px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 13px; font-weight: 500; flex-shrink: 0; }
.av-alma { background: #EEEDFE; color: #3C3489; }
.av-belen { background: #E1F5EE; color: #085041; }
.av-yahir { background: #FAECE7; color: #712B13; }
.person-name { font-size: 16px; font-weight: 500; }
.avg-badge { margin-left: auto; font-size: 22px; font-weight: 500; }
.val-alma { color: #534AB7; }
.val-belen { color: #0F6E56; }
.val-yahir { color: #993C1D; }
.section-row { margin-bottom: 16px; }
.section-info { display: flex; justify-content: space-between; align-items: center; margin-bottom: 6px; }
.section-name { font-size: 13px; color: #333; }
.badges { display: flex; gap: 4px; align-items: center; }
.difficulty { font-size: 11px; padding: 2px 8px; border-radius: 99px; font-weight: 500; }
.dif-facil { background: #EAF3DE; color: #27500A; }
.dif-medio { background: #FAEEDA; color: #633806; }
.dif-dificil { background: #FCEBEB; color: #791F1F; }
.dif-plus { background: #E6F1FB; color: #0C447C; }
.weight-badge { font-size: 11px; padding: 2px 6px; border-radius: 99px; background: #E6F1FB; color: #0C447C; font-weight: 500; }
.bar-wrap { background: #f1efe8; border-radius: 99px; height: 8px; width: 100%; }
.bar-fill { height: 8px; border-radius: 99px; transition: width 0.3s ease; }
.bar-alma { background: #7F77DD; }
.bar-belen { background: #1D9E75; }
.bar-yahir { background: #D85A30; }
.bar-minado { background: #378ADD; }
.input-row { display: flex; align-items: center; gap: 8px; margin-top: 6px; }
.pct-input { width: 64px; font-size: 13px; padding: 4px 8px; border: 0.5px solid #ccc; border-radius: 6px; background: #fff; color: #1a1a1a; text-align: center; }
.pct-input:focus { outline: none; border-color: #7F77DD; box-shadow: 0 0 0 2px #EEEDFE; }
.pct-label { font-size: 12px; color: #888; }
.aporte-real { font-size: 11px; font-weight: 600; color: #0C447C; background: #E6F1FB; padding: 2px 8px; border-radius: 99px; margin-left: 4px; }
.minado-info { font-size: 11px; color: #378ADD; margin-top: 3px; }
svg.donut { transform: rotate(-90deg); }
</style>
</head>
<body>

<h1>Evaluacion de personal</h1>
<p class="subtitle">
  Base: Tabla dinamica/doblez 2x &nbsp;·&nbsp; Pegado 0.5x &nbsp;·&nbsp; Corte 2x &nbsp;·&nbsp; Minado 4x (Excel IDMA)
  &nbsp;|&nbsp; Bono: Validacion Vexi y Azteca — cada 10% suma +5 ptos al promedio final
</p>

<div class="upload-box">
  <span id="conn-status" style="font-size:13px;color:#888;">🔄 Conectando con Google Sheets…</span>
  <button id="refresh-btn" onclick="cargarTodo()" style="font-size:13px;font-weight:500;cursor:pointer;background:#EEEDFE;color:#3C3489;padding:6px 14px;border-radius:6px;border:none;">↻ Actualizar ahora</button>
  <span class="total-info" id="total-info" style="display:none"></span>
  <span class="total-info" style="margin-left:auto;background:#FAEEDA;color:#633806;">Meta: 2500</span>
</div>

<div class="cards" id="cards"></div>

<script>
const people = [
  { name: 'Alma',  key: 'alma',  av: 'av-alma',  bar: 'bar-alma',  val: 'val-alma'  },
  { name: 'Belen', key: 'belen', av: 'av-belen', bar: 'bar-belen', val: 'val-belen' },
  { name: 'Yahir', key: 'yahir', av: 'av-yahir', bar: 'bar-yahir', val: 'val-yahir' },
];

const sections = [
  { name: 'Tabla dinamica / doblez', dif: 'Medio',   difClass: 'dif-medio',   weight: 2,   key: 'tabla',  manualMeta: true },
  { name: 'Pegado',                  dif: 'Facil',   difClass: 'dif-facil',   weight: 0.5, key: 'pegado', manualMeta: true },
  { name: 'Corte',                   dif: 'Medio',   difClass: 'dif-medio',   weight: 2,   key: 'corte',  manualMeta: true },
  { name: 'Minado',                  dif: 'Medio',   difClass: 'dif-medio',   weight: 4,   key: 'minado', fromExcel: true  },
];

const bonusSections = [
  { name: 'Validacion Vexi',   dif: 'Plus', difClass: 'dif-plus', key: 'vexi'   },
  { name: 'Validacion Azteca', dif: 'Plus', difClass: 'dif-plus', key: 'azteca' },
];

const META_TOTAL = 2500;
const META_SECCION = 2500;

const data = {};
people.forEach(p => {
  data[p.key] = {
    vals: sections.map(() => 0),
    cantidades: sections.map(() => 0),
    bonusVals: bonusSections.map(() => 0),
    minadoPct: null, minadoCount: 0, minadoTotal: 0
  };
});

const EXCEL_INDEXED = {
  44: 'FF9900', 53: 'FF9900', 52: 'FF9900',
  13: 'FF00FF', 57: 'FF00FF',
  6:  'FFFF00', 27: 'FFFF00', 36: 'FFFF00',
};

function getRgb(cell) {
  if (!cell || !cell.s) return null;
  const fg = cell.s.fgColor;
  if (!fg) return null;
  if (fg.rgb) { const s = fg.rgb.toUpperCase(); return s.length === 8 ? s.slice(2) : s; }
  if (fg.indexed !== undefined && EXCEL_INDEXED[fg.indexed]) return EXCEL_INDEXED[fg.indexed];
  if (fg.argb) { const s = fg.argb.toUpperCase(); return s.length === 8 ? s.slice(2) : s; }
  return null;
}

function esNaranja(rgb) {
  if (!rgb) return false;
  return ['FF9900','FFA500','FFCC00','FFD700','FFC000','FFFF00','FFE699'].includes(rgb.toUpperCase());
}

function esRosa(rgb) {
  if (!rgb) return false;
  return ['FF00FF','FF99FF','FFCCFF'].includes(rgb.toUpperCase());
}

// ═══════════════════════════════════════════════════════════════
// CONEXIÓN CON GOOGLE SHEETS (vía Apps Script Web App)
// ═══════════════════════════════════════════════════════════════
const API_URL = 'https://script.google.com/macros/s/AKfycbynkBFSJOUa1Yxx1dm6K7X6j3C_eX3AtEWjLFP5iUX0A6-l7uwqs0HeHqavQap8auYq/exec';
const AUTO_REFRESH_MS = 60000; // refresca cada 60 segundos

function setConnStatus(msg, ok) {
  const el = document.getElementById('conn-status');
  if (el) {
    el.textContent = msg;
    el.style.color = ok === true ? '#0F6E56' : ok === false ? '#993C1D' : '#888';
  }
}

async function cargarTodo() {
  setConnStatus('🔄 Actualizando…', null);
  try {
    await Promise.all([cargarIDMA(), cargarCaptura()]);
    setConnStatus('✔ Sincronizado — ' + new Date().toLocaleTimeString(), true);
  } catch (err) {
    setConnStatus('⚠ Error de conexión: ' + err.message, false);
    console.error(err);
  }
}

async function cargarIDMA() {
  const res = await fetch(`${API_URL}?action=getIDMA`);
  const datos = await res.json();
  if (datos.error) throw new Error(datos.error);

  const { counts, blancos, amarillos, rosas } = datos;

  let totalAsignado = 0, totalParaMeta = 0, totalPesoEquipo = 0;
  Object.entries(counts).forEach(([name, c]) => {
    totalAsignado += c;
    const nAmarillos = amarillos[name] || 0;
    totalParaMeta += (c - nAmarillos);
  });
  people.forEach(p => {
    const nameKey = p.name.toUpperCase();
    const nBlancos = blancos[nameKey] || 0;
    const nAmarillos = amarillos[nameKey] || 0;
    const nRosas = rosas[nameKey] || 0;
    totalPesoEquipo += nBlancos * 1 + nAmarillos * 0.5 + nRosas * 0;
  });

  const totalBlancosEquipo = people.reduce((sum, p) => sum + (blancos[p.name.toUpperCase()] || 0), 0);

  const totalEl = document.getElementById('total-info');
  const avanceMeta = META_TOTAL ? Math.round(totalParaMeta / META_TOTAL * 100) : 0;
  totalEl.textContent = `Meta equipo: ${META_TOTAL} | Capturados: ${totalParaMeta} (${avanceMeta}% de avance) | +${totalAsignado - totalParaMeta} extra (amarillas)`;
  totalEl.style.display = '';

  aplicarMinado(counts, {}, totalPesoEquipo, blancos, amarillos, rosas, totalBlancosEquipo);
  renderDonut(counts, totalAsignado, Math.max(0, META_TOTAL - totalParaMeta));
  renderDonutReal(blancos, totalBlancosEquipo);
}

async function cargarCaptura() {
  const res = await fetch(`${API_URL}?action=getCaptura`);
  const captura = await res.json();
  if (captura.error) throw new Error(captura.error);

  people.forEach(p => {
    const nameKey = p.name.toUpperCase();
    const c = captura[nameKey];
    if (!c) return;

    ['tabla', 'pegado', 'corte'].forEach(campo => {
      const idx = sections.findIndex(s => s.key === campo);
      if (idx === -1) return;
      const cantidad = Number(c[campo]) || 0;
      const pct = Math.round(cantidad / META_SECCION * 100);
      data[p.key].cantidades[idx] = cantidad;
      data[p.key].vals[idx] = pct;

      const inputEl = document.getElementById(`input-${p.key}-${idx}`);
      if (inputEl) inputEl.value = cantidad || '';
      const barEl = document.getElementById(`bar-${p.key}-${idx}`);
      if (barEl) barEl.style.width = pct + '%';
      const calcEl = document.getElementById(`pct-calc-${p.key}-${idx}`);
      if (calcEl) calcEl.textContent = pct + '%';
    });

    ['vexi', 'azteca'].forEach((campo, bi) => {
      const valor = Number(c[campo]) || 0;
      data[p.key].bonusVals[bi] = valor;
      const inputEl = document.getElementById(`bonus-${p.key}-${bi}`);
      if (inputEl) inputEl.value = valor || '';
      const ptsEl = document.getElementById(`bonus-pts-${p.key}-${bi}`);
      if (ptsEl) ptsEl.textContent = '+' + Math.round(valor / 2);
    });

    actualizarAporte(p.key, 0);
    refreshAvg(p.key);
  });
}

async function guardarEnSheet(persona, campo, valor) {
  try {
    await fetch(API_URL, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain' }, // evita preflight CORS
      body: JSON.stringify({ action: 'saveCaptura', persona: persona.toUpperCase(), campo, valor })
    });
  } catch (err) {
    console.error('Error guardando en Sheets:', err);
    setConnStatus('⚠ No se pudo guardar: ' + err.message, false);
  }
}


function aplicarMinado(counts, weighted, total, blancos, amarillos, rosas, totalBlancos) {
  people.forEach(p => {
    const nameKey    = p.name.toUpperCase();
    const count      = counts[nameKey]    || 0;
    const nBlancos   = blancos[nameKey]   || 0;
    const nAmarillos = amarillos[nameKey] || 0;
    const nRosas     = rosas[nameKey]     || 0;
    const pct = totalBlancos ? Math.round(nBlancos / totalBlancos * 100) : 0;
    data[p.key].minadoCount = count;
    data[p.key].minadoTotal = total;
    data[p.key].minadoPct   = pct;
    const minadoIdx = sections.findIndex(s => s.key === 'minado');
    data[p.key].vals[minadoIdx] = pct;
    const barEl   = document.getElementById(`bar-${p.key}-${minadoIdx}`);
    if (barEl)   barEl.style.width = pct + '%';
    const inputEl = document.getElementById(`input-${p.key}-${minadoIdx}`);
    if (inputEl) { inputEl.value = pct; inputEl.disabled = true; }
    const infoEl  = document.getElementById(`minado-info-${p.key}`);
    if (infoEl)  infoEl.innerHTML =
      `<span style="color:#1D9E75">✔ ${nBlancos} reales</span> &nbsp;·&nbsp; ` +
      `<span style="color:#D85A30">◆ ${nAmarillos} amarillos</span> &nbsp;·&nbsp; ` +
      `<span style="color:#C026D3">◆ ${nRosas} rosas</span> &nbsp;·&nbsp; total ${count}`;
    actualizarAporte(p.key, minadoIdx);
    refreshAvg(p.key);
  });
}

const TOTAL_PESO_BASE = sections.reduce((sum, s) => sum + s.weight, 0);

function getBaseAvg(key) {
  let totalS = 0;
  data[key].vals.forEach((v, i) => { if (v > 0) totalS += v * sections[i].weight; });
  return totalS / TOTAL_PESO_BASE;
}

function getBonus(key) {
  return data[key].bonusVals.reduce((sum, v) => sum + (v / 2), 0);
}

function getWeightedAvg(key) {
  return Math.round(getBaseAvg(key) + getBonus(key));
}

function refreshAvg(key) {
  const el = document.getElementById('avg-' + key);
  if (el) el.textContent = getWeightedAvg(key) + '%';
}

function renderCards() {
  document.getElementById('cards').innerHTML = people.map(p => `
    <div class="person-card">
      <div class="person-header">
        <div class="avatar ${p.av}">${p.name.substring(0,2).toUpperCase()}</div>
        <span class="person-name">${p.name}</span>
        <span class="avg-badge ${p.val}" id="avg-${p.key}">0%</span>
      </div>
      ${sections.map((sec, i) => `
        <div class="section-row">
          <div class="section-info">
            <span class="section-name">${sec.name}</span>
            <div class="badges">
              <span class="weight-badge">${sec.weight}x</span>
              <span class="difficulty ${sec.difClass}">${sec.dif}</span>
            </div>
          </div>
          <div class="bar-wrap"><div class="bar-fill ${sec.fromExcel ? 'bar-minado' : p.bar}" id="bar-${p.key}-${i}" style="width:0%"></div></div>
          <div class="input-row">
            ${sec.manualMeta ? `
              <input class="pct-input" type="number" min="0" max="${META_SECCION}" value="" placeholder="0"
                id="input-${p.key}-${i}" oninput="updateCantidad('${p.key}',${i},this.value)" />
              <span class="pct-label">de ${META_SECCION}</span>
              <span class="aporte-real" id="pct-calc-${p.key}-${i}">0%</span>
            ` : `
              <input class="pct-input" type="number" min="0" max="100" value="" placeholder="0"
                id="input-${p.key}-${i}"
                ${sec.fromExcel ? 'disabled placeholder="auto"' : ''}
                oninput="updateVal('${p.key}',${i},this.value)" />
              <span class="pct-label">%</span>
            `}
            <span class="aporte-real" id="aporte-${p.key}-${i}">0%</span>
          </div>
          ${sec.fromExcel ? `<div class="minado-info" id="minado-info-${p.key}">Carga el Excel para calcular</div>` : ''}
        </div>
      `).join('')}
      <div style="border-top:0.5px solid #e0dfd8;padding-top:10px;margin-top:4px;">
        <div style="font-size:11px;color:#0C447C;font-weight:500;margin-bottom:8px;">Validaciones — bono adicional</div>
        ${bonusSections.map((sec, i) => `
          <div class="section-row">
            <div class="section-info">
              <span class="section-name">${sec.name}</span>
              <div class="badges"><span class="difficulty ${sec.difClass}">+${sec.name.includes('Vexi') ? 'V' : 'A'}</span></div>
            </div>
            <div class="input-row">
              <input class="pct-input" type="number" min="0" max="100" value="" placeholder="0"
                id="bonus-${p.key}-${i}" oninput="updateBonus('${p.key}',${i},this.value)" />
              <span class="pct-label">% &nbsp;→&nbsp; <span id="bonus-pts-${p.key}-${i}">+0</span> pts</span>
            </div>
          </div>
        `).join('')}
      </div>
    </div>
  `).join('');
}

function updateBonus(key, idx, val) {
  const num = Math.min(100, Math.max(0, parseInt(val)||0));
  data[key].bonusVals[idx] = num;
  const ptsEl = document.getElementById(`bonus-pts-${key}-${idx}`);
  if (ptsEl) ptsEl.textContent = '+' + Math.round(num/2);
  refreshAvg(key);

  const persona = people.find(p => p.key === key).name;
  const campo = bonusSections[idx].key; // 'vexi' | 'azteca'
  guardarEnSheet(persona, campo, num);
}

function updateCantidad(key, idx, val) {
  const cantidad = Math.min(META_SECCION, Math.max(0, parseInt(val) || 0));
  const pct = Math.round(cantidad / META_SECCION * 100);
  data[key].cantidades[idx] = cantidad;
  data[key].vals[idx] = pct;
  document.getElementById(`bar-${key}-${idx}`).style.width = pct + '%';
  const calcEl = document.getElementById(`pct-calc-${key}-${idx}`);
  if (calcEl) calcEl.textContent = pct + '%';
  actualizarAporte(key, idx);
  refreshAvg(key);

  // Guardar en Google Sheets (compartido entre todos)
  const persona = people.find(p => p.key === key).name;
  const campo = sections[idx].key; // 'tabla' | 'pegado' | 'corte'
  guardarEnSheet(persona, campo, cantidad);
}

function updateVal(key, idx, val) {
  const num = Math.min(100, Math.max(0, parseInt(val)||0));
  data[key].vals[idx] = num;
  document.getElementById(`bar-${key}-${idx}`).style.width = num+'%';
  actualizarAporte(key, idx);
  refreshAvg(key);
}

function actualizarAporte(key, idx) {
  sections.forEach((s, i) => {
    const v = data[key].vals[i] || 0;
    const pct = v > 0 ? Math.round((v * s.weight) / TOTAL_PESO_BASE) : 0;
    const el = document.getElementById(`aporte-${key}-${i}`);
    if (el) el.textContent = `${pct}%`;
  });
}

function renderDonut(counts, total, sinAsignar) {
  const colors = { ALMA: '#7F77DD', BELEN: '#1D9E75', YAHIR: '#D85A30', DAVID: '#378ADD' };
  const allCounts = { ...counts };
  if (sinAsignar > 0) allCounts['SIN ASIGNAR'] = sinAsignar;
  const colorsExt = { ...colors, 'SIN ASIGNAR': '#ccc' };
  const entries = Object.entries(allCounts).sort((a,b) => b[1]-a[1]);
  const container = document.getElementById('donut-container');
  if (!container) return;
  let offset = 0;
  const r = 40, cx = 50, cy = 50, stroke = 14, circ = 2 * Math.PI * r;
  let slices = '';
  entries.forEach(([name, cnt]) => {
    const pct = cnt / total, dash = pct * circ, color = colorsExt[name] || '#888';
    slices += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${color}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ - dash}" stroke-dashoffset="${-offset * circ}" />`;
    offset += pct;
  });
  const legend = entries.map(([name, cnt]) => {
    const color = colorsExt[name] || '#888', pct = Math.round(cnt/total*100);
    return `<div style="display:flex;align-items:center;gap:6px;font-size:12px;"><div style="width:10px;height:10px;border-radius:50%;background:${color};flex-shrink:0;"></div><span>${name.charAt(0)+name.slice(1).toLowerCase()}: ${cnt} (${pct}%)</span></div>`;
  }).join('');
  container.innerHTML = `<div style="font-size:12px;color:#888;font-weight:500;margin-bottom:8px;">Distribucion de minado — ${total} registros totales</div><div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;"><svg width="100" height="100" viewBox="0 0 100 100" class="donut">${slices}</svg><div style="display:flex;flex-direction:column;gap:6px;">${legend}</div></div>`;
}

function renderDonutReal(blancos, totalBlancos) {
  const colors = { ALMA: '#7F77DD', BELEN: '#1D9E75', YAHIR: '#D85A30' };
  const container = document.getElementById('donut-real-container');
  if (!container) return;
  const entries = people.map(p => [p.name.toUpperCase(), blancos[p.name.toUpperCase()] || 0]);
  const total = totalBlancos || entries.reduce((s, [,v]) => s + v, 0);
  if (total === 0) { container.innerHTML = '<div style="font-size:12px;color:#aaa;padding:4px">Carga el Excel para ver distribución real</div>'; return; }
  let offset = 0;
  const r = 40, cx = 50, cy = 50, stroke = 14, circ = 2 * Math.PI * r;
  let slices = '';
  entries.forEach(([name, cnt]) => {
    const pct = cnt / total, dash = pct * circ;
    slices += `<circle cx="${cx}" cy="${cy}" r="${r}" fill="none" stroke="${colors[name]}" stroke-width="${stroke}" stroke-dasharray="${dash} ${circ - dash}" stroke-dashoffset="${-offset * circ}" />`;
    offset += pct;
  });
  const legend = entries.map(([name, cnt]) => {
    const pct = Math.round(cnt / total * 100);
    return `<div style="display:flex;align-items:center;gap:6px;font-size:12px;"><div style="width:10px;height:10px;border-radius:50%;background:${colors[name]};flex-shrink:0;"></div><span>${name.charAt(0)+name.slice(1).toLowerCase()}: ${cnt} (${pct}%)</span></div>`;
  }).join('');
  container.innerHTML = `<div style="font-size:12px;color:#888;font-weight:500;margin-bottom:8px;">Distribucion minado real (sin amarillos) — ${total} registros</div><div style="display:flex;gap:24px;align-items:center;flex-wrap:wrap;"><svg width="100" height="100" viewBox="0 0 100 100" class="donut">${slices}</svg><div style="display:flex;flex-direction:column;gap:6px;">${legend}</div></div>`;
}

renderCards();

const donutSection = document.createElement('div');
donutSection.id = 'donut-container';
donutSection.style = 'background:#fff;border:0.5px solid #e0dfd8;border-radius:12px;padding:1.25rem;margin-top:1rem;';
document.body.appendChild(donutSection);

const donutRealSection = document.createElement('div');
donutRealSection.id = 'donut-real-container';
donutRealSection.style = 'background:#fff;border:0.5px solid #e0dfd8;border-radius:12px;padding:1.25rem;margin-top:1rem;';
donutRealSection.innerHTML = '<div style="font-size:12px;color:#aaa;padding:4px">Cargando…</div>';
document.body.appendChild(donutRealSection);

// Carga inicial + refresco automático cada 60s
cargarTodo();
setInterval(cargarTodo, AUTO_REFRESH_MS);
</script>
</body>
</html>
